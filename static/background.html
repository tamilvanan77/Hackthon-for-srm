<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Background Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: transparent;
            overflow: hidden;
        }

        .bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #060b17 0%, #0a1020 45%, #0d1628 100%);
            overflow: hidden;
        }

        /* ---- Aurora Blobs ---- */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            mix-blend-mode: screen;
            will-change: transform;
        }
        .blob-blue {
            width: 60vmax; height: 60vmax;
            top: -20vmax; left: -12vmax;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            opacity: 0.28;
            animation: drift-blue 22s ease-in-out infinite alternate;
        }
        .blob-green {
            width: 50vmax; height: 50vmax;
            bottom: -18vmax; right: -12vmax;
            background: radial-gradient(circle, #10b981 0%, transparent 70%);
            opacity: 0.22;
            animation: drift-green 28s ease-in-out infinite alternate;
        }
        .blob-purple {
            width: 35vmax; height: 35vmax;
            top: 35%; left: 28%;
            background: radial-gradient(circle, #818cf8 0%, transparent 70%);
            opacity: 0.14;
            animation: drift-purple 20s ease-in-out infinite alternate;
        }
        .blob-cyan {
            width: 25vmax; height: 25vmax;
            top: 60%; left: 60%;
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            opacity: 0.10;
            animation: drift-cyan 24s ease-in-out infinite alternate;
        }

        /* ---- Perspective Grid Floor ---- */
        .grid-floor {
            position: absolute;
            bottom: 0; left: -20%;
            width: 140%; height: 70%;
            opacity: 0.09;
            background-image:
                linear-gradient(rgba(148,163,184,0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,0.25) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(600px) rotateX(65deg) translateY(30%);
            animation: grid-pan 30s linear infinite;
        }

        /* ---- Pulsing Rings ---- */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(79, 139, 249, 0.18);
            animation: ring-pulse 6s ease-in-out infinite;
        }
        .ring-1 { width:200px; height:200px; top:20%; left:15%; animation-delay:0s; }
        .ring-2 { width:350px; height:350px; top:15%; left:10%; animation-delay:1s; border-color:rgba(79,139,249,0.10); }
        .ring-3 { width:500px; height:500px; top:10%; left:05%; animation-delay:2s; border-color:rgba(79,139,249,0.05); }

        /* ---- Scanning Horizontal Line ---- */
        .scan-line {
            position: absolute;
            left: 0; top: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(79, 139, 249, 0) 20%,
                rgba(79, 139, 249, 0.6) 50%,
                rgba(56, 189, 248, 0.6) 60%,
                rgba(79, 139, 249, 0) 80%,
                transparent 100%);
            box-shadow: 0 0 12px rgba(79, 139, 249, 0.5);
            animation: scan 8s linear infinite;
            opacity: 0;
        }
        .scan-line-2 {
            animation-delay: 4s;
        }

        /* ---- Neural Network Nodes ---- */
        .nodes-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* ---- Data Card Particles ---- */
        .data-card {
            position: absolute;
            width: 40px; height: 22px;
            border: 1px solid rgba(79, 139, 249, 0.3);
            border-radius: 3px;
            background: rgba(79, 139, 249, 0.05);
            opacity: 0;
            animation: float-card var(--dc, 12s) ease-in-out infinite;
            animation-delay: var(--dcd, 0s);
        }
        .data-card::after {
            content: '';
            display: block;
            width: 60%;
            height: 2px;
            background: rgba(79, 139, 249, 0.4);
            border-radius: 1px;
            margin: 6px auto 3px;
            box-shadow: 0 3px 0 rgba(79,139,249,0.2);
        }

        /* ---- Twinkling Particles ---- */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--d, 4s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
            left: var(--x, 50%);
            top: var(--y, 50%);
            opacity: 0;
        }

        /* ---- SVG connector canvas ---- */
        #node-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* ========== KEYFRAMES ========== */
        @keyframes drift-blue {
            0%   { transform: translate3d(0,0,0) scale(1); }
            50%  { transform: translate3d(7vmax,5vmax,0) scale(1.06); }
            100% { transform: translate3d(12vmax,9vmax,0) scale(1.13); }
        }
        @keyframes drift-green {
            0%   { transform: translate3d(0,0,0) scale(1); }
            50%  { transform: translate3d(-6vmax,-4vmax,0) scale(1.09); }
            100% { transform: translate3d(-11vmax,-8vmax,0) scale(1.15); }
        }
        @keyframes drift-purple {
            0%   { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
            100% { transform: translate3d(6vmax,-6vmax,0) scale(1.22) rotate(35deg); }
        }
        @keyframes drift-cyan {
            0%   { transform: translate3d(0,0,0) scale(1); }
            100% { transform: translate3d(-8vmax,4vmax,0) scale(1.18); }
        }
        @keyframes grid-pan {
            0%   { background-position: 0px 0px; }
            100% { background-position: 0px -60px; }
        }
        @keyframes ring-pulse {
            0%,100% { transform: scale(1);    opacity: 0.5; }
            50%      { transform: scale(1.06); opacity: 1;   }
        }
        @keyframes twinkle {
            0%,100% { opacity: 0; transform: scale(0.5); }
            50%     { opacity: 0.85; transform: scale(1); }
        }
        @keyframes scan {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 0.6; }
            100% { top: 100vh; opacity: 0; }
        }
        @keyframes float-card {
            0%   { transform: translateY(0) rotate(var(--dr, 0deg)); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-60vh) rotate(calc(var(--dr, 0deg) + 15deg)); opacity: 0; }
        }
        @keyframes node-pulse {
            0%,100% { r: 3; opacity: 0.4; }
            50%      { r: 5; opacity: 1;   }
        }
        @keyframes edge-dash {
            to { stroke-dashoffset: -30; }
        }
    </style>
</head>
<body>
    <div class="bg-canvas" id="bg">
        <!-- Aurora Blobs -->
        <div class="blob blob-blue"></div>
        <div class="blob blob-green"></div>
        <div class="blob blob-purple"></div>
        <div class="blob blob-cyan"></div>

        <!-- Perspective Grid Floor -->
        <div class="grid-floor"></div>

        <!-- Pulsing Rings -->
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>

        <!-- Scanning Lines -->
        <div class="scan-line"></div>
        <div class="scan-line scan-line-2"></div>

        <!-- Neural Network SVG (filled by JS) -->
        <svg id="node-svg" xmlns="http://www.w3.org/2000/svg"></svg>

        <!-- Data Card + Particle containers (filled by JS) -->
        <div id="cards"></div>
        <div id="particles"></div>
    </div>

    <script>
        /* ---- Twinkling Particles ---- */
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 100; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.setProperty('--x', Math.random() * 100 + '%');
            p.style.setProperty('--y', Math.random() * 100 + '%');
            p.style.setProperty('--d', (2 + Math.random() * 6) + 's');
            p.style.setProperty('--delay', (Math.random() * 8) + 's');
            const sz = (Math.random() > 0.6 ? 2 : 1) + 'px';
            p.style.width = sz; p.style.height = sz;
            pContainer.appendChild(p);
        }

        /* ---- Floating Data Cards ---- */
        const cContainer = document.getElementById('cards');
        for (let i = 0; i < 14; i++) {
            const c = document.createElement('div');
            c.className = 'data-card';
            c.style.left  = (5 + Math.random() * 90) + '%';
            c.style.top   = (20 + Math.random() * 75) + '%';
            c.style.setProperty('--dc', (10 + Math.random() * 14) + 's');
            c.style.setProperty('--dcd', (Math.random() * 10) + 's');
            c.style.setProperty('--dr', (Math.random() * 20 - 10) + 'deg');
            cContainer.appendChild(c);
        }

        /* ---- Neural Network Nodes (SVG) ---- */
        const svg = document.getElementById('node-svg');
        const W = window.innerWidth, H = window.innerHeight;

        // Fixed node positions (normalized 0-1)
        const nodePositions = [
            [0.12, 0.35], [0.10, 0.55], [0.15, 0.72],
            [0.30, 0.25], [0.32, 0.50], [0.28, 0.70],
            [0.55, 0.30], [0.58, 0.55], [0.52, 0.75],
            [0.78, 0.40], [0.80, 0.62],
            [0.92, 0.30], [0.90, 0.55], [0.88, 0.75],
        ];

        // Edges (pairs of node indices) — form a loose network
        const edges = [
            [0,3],[1,3],[1,4],[2,4],[2,5],
            [3,6],[4,6],[4,7],[5,7],[5,8],
            [6,9],[7,9],[7,10],[8,10],
            [9,11],[9,12],[10,12],[10,13],
        ];

        // Draw edges
        edges.forEach(([a, b], idx) => {
            const [ax, ay] = nodePositions[a];
            const [bx, by] = nodePositions[b];
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', ax * W); line.setAttribute('y1', ay * H);
            line.setAttribute('x2', bx * W); line.setAttribute('y2', by * H);
            line.setAttribute('stroke', 'rgba(79,139,249,0.18)');
            line.setAttribute('stroke-width', '1');
            line.setAttribute('stroke-dasharray', '6 4');
            line.style.animation = `edge-dash ${3 + (idx % 4)}s linear infinite`;
            svg.appendChild(line);
        });

        // Draw nodes
        nodePositions.forEach(([nx, ny], idx) => {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', nx * W);
            circle.setAttribute('cy', ny * H);
            circle.setAttribute('r', 3);
            circle.setAttribute('fill', 'rgba(79,139,249,0.6)');
            circle.setAttribute('filter', 'url(#glow)');
            circle.style.animation = `node-pulse ${3 + (idx % 3)}s ease-in-out infinite`;
            circle.style.animationDelay = (idx * 0.3) + 's';
            svg.appendChild(circle);
        });

        // Glow filter
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>`;
        svg.insertBefore(defs, svg.firstChild);
    </script>
</body>
</html>
